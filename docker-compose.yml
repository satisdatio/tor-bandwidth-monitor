version: "3.8"

services:
  tor-monitor:
    build: .
    container_name: tor-monitor-pro
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - TOR_CONTROL_HOST=tor
      - TOR_CONTROL_PORT=9051
      - TOR_MONITOR_SECRET_KEY=${TOR_MONITOR_SECRET_KEY}
      - TOR_MONITOR_DB_URL=postgresql://toruser:torpass@postgres:5432/tormonitor
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8080
      - PROMETHEUS_PORT=9090
    volumes:
      - ./data:/app/data
      - ./plugins:/app/plugins
      - ./audit.log:/app/audit.log
    depends_on:
      - postgres
      - tor
    networks:
      - tor-network

  tor:
    image: tor:latest
    container_name: tor-relay
    restart: unless-stopped
    volumes:
      - ./torrc:/etc/tor/torrc:ro
      - ./tor-data:/var/lib/tor
    ports:
      - "9050:9050"
      - "9051:9051"
    networks:
      - tor-network

  postgres:
    image: postgres:15-alpine
    container_name: tor-monitor-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=toruser
      - POSTGRES_PASSWORD=torpass
      - POSTGRES_DB=tormonitor
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - tor-network

  grafana:
    image: grafana/grafana:latest
    container_name: tor-monitor-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - tor-monitor
    networks:
      - tor-network

  prometheus:
    image: prom/prometheus:latest
    container_name: tor-monitor-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prom-data:/prometheus
    depends_on:
      - tor-monitor
    networks:
      - tor-network

volumes:
  pgdata:
  grafana-data:
  prom-data:

networks:
  tor-network:
    driver: bridge